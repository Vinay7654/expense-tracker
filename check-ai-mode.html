<!DOCTYPE html>
<html>
<head>
    <title>Check AI Mode</title>
</head>
<body>
    <h1>AI Mode Checker</h1>
    <button onclick="checkAIMode()">Check if Real AI or Demo</button>
    <div id="result"></div>

    <script type="module">
        // Import the same way your app does
        const apiKey = 'AIzaSyAWJXtJq4gZbFa3FYjis_6TqOPuxZQN5g';
        
        async function checkAIMode() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Checking...';
            
            try {
                // Test real Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Respond with just: REAL AI WORKING"
                            }]
                        }]
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    
                    if (aiResponse.includes('REAL AI WORKING')) {
                        resultDiv.innerHTML = `
                            <h3>✅ REAL GEMINI AI IS WORKING!</h3>
                            <p><strong>Response:</strong> ${aiResponse}</p>
                            <p>Your app should be using real Gemini AI.</p>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <h3>⚠️ UNEXPECTED RESPONSE</h3>
                            <p><strong>Got:</strong> ${aiResponse}</p>
                            <p>API is working but response is unexpected.</p>
                        `;
                    }
                } else {
                    resultDiv.innerHTML = `
                        <h3>❌ API ERROR</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${await response.text()}</p>
                        <p>Your app will fall back to demo AI.</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ NETWORK ERROR</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Your app will fall back to demo AI.</p>
                `;
            }
        }
        
        window.checkAIMode = checkAIMode;
    </script>
</body>
</html>
